<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>Napat Remote Pro</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --red: #ff2d55; --dark: #121212; --card: #1e1e1e; --green: #32d74b; --jbl-orange: #FF6A00; }
        body { background:var(--dark); color:white; font-family:sans-serif; padding:15px; margin:0; padding-bottom:120px; }
        .header { display:flex; justify-content:space-between; align-items:center; background:var(--card); padding:15px; border-radius:18px; margin-bottom:15px; border:1px solid #333; }
        .btn-skip { width:100%; padding:20px; background:linear-gradient(to right, #ff2d55, #ff5e3a); border:none; color:white; border-radius:50px; font-weight:bold; font-size:20px; margin-bottom:10px; }
        .btn-pause { width:100%; padding:14px; border-radius:15px; border:1px solid #444; color:white; background:#5856d6; margin-bottom:20px; font-weight:bold; }
        .search-box { display:flex; gap:10px; margin-bottom:20px; }
        input { flex:1; padding:15px; border-radius:12px; border:1px solid #444; background:#222; color:white; font-size:16px; outline:none; }
        .btn-search { padding:0 25px; background:#007aff; border:none; color:white; border-radius:12px; font-weight:bold; }
        .queue-item { background:var(--card); padding:15px; border-radius:18px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border:1px solid #333; }
        .playing { border: 1px solid var(--green); background: rgba(50, 215, 75, 0.05); }
        .btn-move { background:#333; color:var(--jbl-orange); border:none; width:45px; height:45px; border-radius:10px; font-weight:bold; font-size:18px; }
    </style>
</head>
<body>
    <div class="header">
        <h2 id="room-name" style="margin:0; color:var(--red);">ห้อง: -</h2>
        <span style="font-size:12px; color:#555;">Napat Edition</span>
    </div>
    
    <button class="btn-skip" onclick="socket.emit('skip_song', roomId)">ข้ามเพลง ❯❯</button>
    <button id="pause-btn" class="btn-pause" onclick="togglePlay()">⏸️ หยุดชั่วคราว</button>

    <div class="search-box">
        <input type="text" id="search-input" placeholder="ค้นหาเพลง..." onkeypress="if(event.key==='Enter') search()">
        <button class="btn-search" onclick="search()">ค้นหา</button>
    </div>
    <div id="results"></div>
    <div style="color:var(--green); font-weight:bold; margin-bottom:10px;">คิวเพลง (กดค้าง 2 วินาทีเพื่อลบ)</div>
    <div id="queue-list"></div>

    <script>
        const socket = io({ path: '/socket.io', transports: ['websocket'] });
        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room') || urlParams.get('r') || localStorage.getItem('last_room');
        if(roomId) localStorage.setItem('last_room', roomId);

        let isPaused = false, pressTimer;

        socket.on('connect', () => { 
            document.getElementById('room-name').innerText = "ห้อง: " + (roomId || "...");
            if(roomId) socket.emit('join_room', roomId); 
        });

        function togglePlay() {
            isPaused = !isPaused;
            socket.emit('control_video', { roomId, action: isPaused ? 'pause' : 'resume' });
            document.getElementById('pause-btn').innerText = isPaused ? "▶️ เล่นต่อ" : "⏸️ หยุดชั่วคราว";
        }

        async function search() {
            const q = document.getElementById('search-input').value; if(!q) return;
            const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
            const songs = await res.json();
            document.getElementById('results').innerHTML = songs.map(s => `
                <div style="background:#1e1e1e; padding:10px; border-radius:12px; margin-bottom:10px; display:flex; align-items:center; gap:10px;">
                    <img src="${s.thumbnails}" width="60" height="40" style="border-radius:5px;">
                    <div style="flex:1; font-size:14px;">${s.title}</div>
                    <button style="background:#007aff; color:white; border:none; padding:10px 15px; border-radius:10px; font-weight:bold;" onclick='addSong(${JSON.stringify(s).replace(/'/g,"&apos;")})'>จอง</button>
                </div>`).join('');
        }

        function addSong(song) { 
            socket.emit('add_to_queue', { roomId, song }); 
            document.getElementById('results').innerHTML = ""; 
            document.getElementById('search-input').value = ""; 
        }

        function delSong(i, t) { 
            if(i >= 0 && confirm(`ลบเพลง "${t}"?`)) socket.emit('delete_song', { roomId, index: i }); 
        }

        socket.on('queue_update', (q) => {
            const list = document.getElementById('queue-list');
            list.innerHTML = q.map((s, i) => `
                <div class="queue-item ${i===0?'playing':''}" 
                     ontouchstart="pressTimer=setTimeout(()=>delSong(${i},'${s.title.replace(/'/g,"")}'), 2000)" 
                     ontouchend="clearTimeout(pressTimer)" 
                     onmousedown="pressTimer=setTimeout(()=>delSong(${i},'${s.title.replace(/'/g,"")}'), 2000)" 
                     onmouseup="clearTimeout(pressTimer)">
                    <div style="flex:1;">
                        <small style="color:var(--green)">${i===0?'กำลังเล่น':'คิวที่ '+(i+1)}</small>
                        <div style="font-size:14px;">${s.title}</div>
                    </div>
                    <div style="display:flex; gap:8px;">
                        ${i === 0 ? `<button style="background:#fff; border:none; padding:8px; border-radius:8px; font-size:11px;" onclick="socket.emit('force_retry_play', roomId)">เริ่มใหม่</button>` : ''}
                        ${i > 0 ? `<button class="btn-move" onclick="event.stopPropagation(); socket.emit('move_song',{roomId,index:${i},direction:'up'})">▲</button>` : ''}
                        ${i > 0 && i < q.length - 1 ? `<button class="btn-move" onclick="event.stopPropagation(); socket.emit('move_song',{roomId,index:${i},direction:'down'})">▼</button>` : ''}
                    </div>
                </div>`).join('');
        });
    </script>
</body>
</html>
