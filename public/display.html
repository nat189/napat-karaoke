<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Napat Karaoke TV - Pro Edition</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { margin:0; background:#000; color:#fff; font-family:sans-serif; overflow:hidden; width:100vw; height:100vh; }
        #bg-layer { position:fixed; top:0; left:0; width:100vw; height:100vh; background-color:#111; background-position: center; background-repeat: no-repeat; background-size: cover; z-index:0; transition: background-image 2.5s ease-in-out; }
        #bg-overlay { position:fixed; top:0; left:0; width:100vw; height:100vh; background: rgba(0,0,0,0.4); z-index:1; }
        #player-wrapper { position:relative; width:100vw; height:100vh; z-index:5; opacity:0; transition: opacity 1.5s; }
        #player { width: 100%; height: 100%; pointer-events: none; }
        #score-overlay { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.95); backdrop-filter:blur(20px); padding:50px 80px; border-radius:40px; text-align:center; z-index:1000; border:4px solid #ff2d55; display:none; box-shadow:0 0 70px rgba(255,45,85,0.6); }
        .score-num { font-size:120px; font-weight:bold; color:#ff2d55; margin:15px 0; }
        #pair-ui-overlay { position:fixed; bottom:5%; right:5%; background:rgba(0,0,0,0.85); backdrop-filter:blur(15px); padding:25px; border-radius:25px; z-index:100; border:1px solid rgba(255,255,255,0.1); text-align:center; transition: all 0.8s ease; }
        #qrcode { background:#fff; padding:12px; border-radius:12px; display:inline-block; }
        #queue-box { position:fixed; top:5%; right:5%; width:350px; background:rgba(0,0,0,0.85); backdrop-filter:blur(10px); padding:20px; border-radius:20px; z-index:200; border:1px solid rgba(255,255,255,0.1); transition: all 0.8s ease; opacity: 0; visibility: hidden; }
    </style>
</head>
<body>
    <div id="bg-layer"></div><div id="bg-overlay"></div>
    <div id="player-wrapper"><div id="player"></div></div>
    <div id="score-overlay"><div style="font-size:26px; color:#0f0;">SINGING FINISHED!</div><div class="score-num" id="score-val">0</div><div id="score-msg" style="font-size:32px; font-weight:bold;">สุดยอด!</div></div>
    <div id="pair-ui-overlay"><div id="room-id" style="font-size:32px; color:#ff2d55; font-weight:bold; margin-bottom:10px;">Connecting...</div><div id="qrcode"></div><p style="margin-top:10px; font-weight:bold;">สแกนเพื่อจองเพลง 🎤</p></div>
    <div id="queue-box"><div style="color:#0f0; font-weight:bold; font-size:20px; margin-bottom:10px;">คิวถัดไป:</div><div id="items" style="font-size:18px;"></div></div>

    <script>
        const socket = io({ path: '/socket.io', transports: ['websocket', 'polling'] });
        let player, currentRoom = "", checkTimer;

        function updateBackground() {
            const bgLayer = document.getElementById('bg-layer');
            const randomId = Math.floor(Math.random() * 1000);
            const imageUrl = `https://picsum.photos/id/${randomId}/1920/1080`;
            const tempImg = new Image();
            tempImg.src = imageUrl;
            tempImg.onload = () => { bgLayer.style.backgroundImage = `url('${imageUrl}')`; };
        }
        updateBackground();

        socket.on('connect', () => {
            const savedRoom = localStorage.getItem('karaoke_room');
            socket.emit('tv_init', { savedRoom });
        });

        socket.on('tv_assigned', (data) => {
            currentRoom = data.roomId;
            localStorage.setItem('karaoke_room', currentRoom);
            document.getElementById('room-id').innerText = "ห้อง: " + currentRoom;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { 
                text: `http://192.168.0.154:3030/controller.html?room=${currentRoom}&p=${data.pass}&tvId=${socket.id}`, 
                width: 220, height: 220 
            });
        });

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', { 
                height:'100%', width:'100%', 
                playerVars:{ 'autoplay':1, 'mute':1, 'controls':0, 'rel':0, 'modestbranding':1, 'disablekb':1 },
                events: {
                    'onReady': (event) => { setTimeout(() => { if(player.unMute){ player.unMute(); player.setVolume(100); } }, 1500); },
                    'onStateChange': (e) => {
                        if(e.data === YT.PlayerState.PLAYING) { setUI("playing"); startTimer(); }
                        if(e.data === YT.PlayerState.ENDED) { stopTimer(); showScore(); }
                    }
                }
            });
        }

        socket.on('video_action', (action) => {
            if (!player) return;
            if (action === 'pause') player.pauseVideo();
            if (action === 'resume') player.playVideo();
        });

        function setUI(status) {
            const qr = document.getElementById('pair-ui-overlay'), qBox = document.getElementById('queue-box'), pWrap = document.getElementById('player-wrapper');
            if (status === "playing") { qr.style.opacity = "0"; qr.style.visibility = "hidden"; qBox.style.opacity = "0"; qBox.style.visibility = "hidden"; pWrap.style.opacity = "1"; }
            else if (status === "remind") { qr.style.visibility = "visible"; qr.style.opacity = "1"; qBox.style.visibility = "visible"; qBox.style.opacity = "1"; }
            else { qr.style.visibility = "visible"; qr.style.opacity = "1"; qBox.style.visibility = "hidden"; pWrap.style.opacity = "0"; }
        }

        function startTimer() { if (checkTimer) clearInterval(checkTimer); checkTimer = setInterval(() => { if (player && player.getDuration) { if ((player.getDuration() - player.getCurrentTime()) <= 20) { setUI("remind"); clearInterval(checkTimer); } } }, 1000); }
        function stopTimer() { if (checkTimer) clearInterval(checkTimer); }
        function showScore() {
            const score = Math.floor(Math.random() * 21) + 80;
            document.getElementById('score-val').innerText = score;
            document.getElementById('score-overlay').style.display = 'block';
            document.getElementById('player-wrapper').style.opacity = "0";
            updateBackground();
            setTimeout(() => { document.getElementById('score-overlay').style.display = 'none'; socket.emit('song_ended', currentRoom); }, 5000);
        }

        socket.on('play', (s) => { if(s) { player.loadVideoById(s.videoId); player.playVideo(); } else { setUI("idle"); if(player) player.stopVideo(); } });
        socket.on('queue_update', (q) => { document.getElementById('items').innerHTML = q.slice(1, 4).map((s,i)=>`<div>${i+1}. ${s.title}</div>`).join(''); });
        const tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api"; document.head.appendChild(tag);
    </script>
</body>
</html>
